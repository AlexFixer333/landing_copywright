<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Обработка платежа — CopywritingExpert</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1A1A2E 0%, #16213E 100%);
            color: white;
        }
        .loader {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(255,255,255,0.1);
            border-top: 4px solid #FF8C00;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loader">
        <div class="spinner"></div>
        <h2>Обработка платежа...</h2>
        <p>Пожалуйста, подождите</p>
    </div>

    <script>
        // Получаем параметры из URL
        const urlParams = new URLSearchParams(window.location.search);
        const paymentStatus = urlParams.get('payment_status');
        const email = urlParams.get('metadata[email]') || sessionStorage.getItem('customerEmail');
        const name = urlParams.get('metadata[name]') || sessionStorage.getItem('customerName');
        const orderId = urlParams.get('metadata[order_id]');
        
        console.log('Payment status:', paymentStatus);
        console.log('Email:', email);
        console.log('Order ID:', orderId);
        
        // Сохраняем данные в sessionStorage
        if (email) sessionStorage.setItem('customerEmail', email);
        if (name) sessionStorage.setItem('customerName', name);
        if (orderId) sessionStorage.setItem('lastOrderId', orderId);
        
        // Ждем 2 секунды и перенаправляем
        setTimeout(() => {
            if (paymentStatus === 'succeeded' || paymentStatus === 'waiting_for_capture') {
                // Успешная оплата
                window.location.href = `/purchaseok.html?email=${encodeURIComponent(email)}&order_id=${orderId}&status=success`;
            } else if (paymentStatus === 'canceled' || paymentStatus === 'failed') {
                // Неудачная оплата
                window.location.href = `/no.html?email=${encodeURIComponent(email)}&order_id=${orderId}&status=failed`;
            } else {
                // По умолчанию — успех (ЮKassa сама перенаправит)
                window.location.href = `/purchaseok.html?email=${encodeURIComponent(email)}&order_id=${orderId}&status=success`;
            }
        }, 2000);
    </script>
</body>
</html>
