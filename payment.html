<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата — CopywritingExpert</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .btn-primary {
            background: linear-gradient(135deg, #FF8C00 0%, #FF7F00 100%);
            transition: all 0.3s ease;
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 140, 0, 0.4);
        }
        .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; }
        .payment-method {
            border: 2px solid #E5E7EB;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .payment-method:hover { border-color: #FF8C00; }
        .payment-method.selected {
            border-color: #FF8C00;
            background: #FFF5E6;
        }
    </style>
</head>
<body class="bg-gray-50">

    <header class="bg-[#1A1A2E] text-white py-4">
        <div class="max-w-4xl mx-auto px-6 flex justify-between items-center">
            <div>
                <span class="font-serif text-2xl font-bold">Copywriting</span>
                <span class="font-serif text-2xl font-bold italic text-[#FF8C00]">Expert</span>
            </div>
            <a href="index.html" class="text-white/80 hover:text-white">← Вернуться</a>
        </div>
    </header>

    <section class="py-16">
        <div class="max-w-2xl mx-auto px-6">
            <h1 class="font-serif text-3xl font-bold text-center mb-8">Оформление оплаты</h1>
            
            <div class="bg-white rounded-2xl p-8 shadow-xl">
                <!-- Данные заказа -->
                <div class="bg-gray-50 rounded-xl p-6 mb-6">
                    <h2 class="font-bold mb-4">Данные заказа:</h2>
                    <div class="space-y-2">
                        <div class="flex justify-between">
                            <span class="text-gray-600">Имя:</span>
                            <span class="font-semibold" id="displayName">—</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-600">Email:</span>
                            <span class="font-semibold" id="displayEmail">—</span>
                        </div>
                        <div class="flex justify-between pt-3 border-t">
                            <span class="text-gray-600">Сумма:</span>
                            <span class="font-bold text-[#FF8C00] text-2xl">499 руб.</span>
                        </div>
                    </div>
                </div>

                <!-- Способы оплаты -->
                <h2 class="font-bold mb-4">Выберите способ оплаты:</h2>
                <div class="space-y-3 mb-6">
                    <div class="payment-method rounded-lg p-4 flex items-center gap-4" onclick="selectPayment('card')">
                        <span class="text-2xl">💳</span>
                        <div class="flex-1">
                            <div class="font-semibold">Банковская карта</div>
                            <div class="text-sm text-gray-500">Visa, Mastercard, МИР</div>
                        </div>
                    </div>
                    <div class="payment-method rounded-lg p-4 flex items-center gap-4" onclick="selectPayment('sbp')">
                        <span class="text-2xl">⚡</span>
                        <div class="flex-1">
                            <div class="font-semibold">СБП</div>
                            <div class="text-sm text-gray-500">Система быстрых платежей</div>
                        </div>
                    </div>
                </div>

                <!-- Кнопка -->
                <button id="payBtn" onclick="processPayment()" class="btn-primary w-full text-white py-4 rounded-lg font-bold text-lg" disabled>
                    Выберите способ оплаты
                </button>

                <p class="text-sm text-gray-500 text-center mt-4">
                     Оплата защищена • ⚡ Методичка придет на email • ✅ Гарантия 7 дней
                </p>
            </div>
        </div>
    </section>

    <script>
        // ===== ВАШИ ДАННЫЕ ЮKASSA =====
        const SHOP_ID = '123456'; // Замените на ваш Shop ID
        const SECRET_KEY = 'test_Y9K3mN7pQ2wR5tU8vX1zA4bC6dE0fG'; // Замените на ваш Secret Key

        // Получаем данные из URL
        const urlParams = new URLSearchParams(window.location.search);
        const customerName = urlParams.get('name') || 'Клиент';
        const customerEmail = urlParams.get('email') || '';

        document.getElementById('displayName').textContent = customerName;
        document.getElementById('displayEmail').textContent = customerEmail;

        let selectedPayment = null;

        function selectPayment(method) {
            selectedPayment = method;
            document.querySelectorAll('.payment-method').forEach(el => el.classList.remove('selected'));
            event.currentTarget.classList.add('selected');
            
            const btn = document.getElementById('payBtn');
            btn.disabled = false;
            btn.textContent = 'Оплатить 499 руб. →';
        }

        function generateOrderId() {
            return `CW-${Date.now()}-${Math.floor(Math.random() * 1000)}`;
        }

        async function processPayment() {
            if (!selectedPayment) return;

            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Создание платежа...';

            try {
                const orderId = generateOrderId();
                
                // Создаем платеж в ЮKassa
                const response = await fetch('https://api.yookassa.ru/v3/payments', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Idempotence-Key': orderId,
                        'Authorization': 'Basic ' + btoa(SHOP_ID + ':' + SECRET_KEY)
                    },
                    body: JSON.stringify({
                        amount: { value: '499.00', currency: 'RUB' },
                        confirmation: {
                            type: 'redirect',
                            return_url: `${window.location.origin}/purchaseok.html?order_id=${orderId}&email=${encodeURIComponent(customerEmail)}&name=${encodeURIComponent(customerName)}`
                        },
                        capture: true,
                        description: `Методичка для ${customerName}`,
                        metadata: {
                            email: customerEmail,
                            name: customerName,
                            order_id: orderId
                        }
                    })
                });

                if (!response.ok) {
                    throw new Error('Не удалось создать платеж');
                }

                const data = await response.json();
                
                if (data.confirmation?.confirmation_url) {
                    // Перенаправляем на оплату в ЮKassa
                    window.location.href = data.confirmation.confirmation_url;
                } else {
                    throw new Error('Нет ссылки на оплату');
                }

            } catch (error) {
                alert('Ошибка: ' + error.message + '\nНапишите нам: @shundyquru');
                btn.disabled = false;
                btn.textContent = 'Оплатить 499 руб. →';
            }
        }
    </script>
</body>
</html>
