<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата — CopywritingExpert</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <header class="bg-[#1A1A2E] text-white py-4">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <span class="font-[Playfair_Display] text-3xl font-bold">Copywriting</span>
            <span class="font-[Playfair_Display] text-3xl font-bold italic text-[#FF8C00]">Expert</span>
        </div>
    </header>

    <section class="py-16">
        <div class="max-w-2xl mx-auto px-6">
            <h1 class="text-3xl font-bold text-center mb-8">Оформление оплаты</h1>
            
            <div class="bg-white rounded-2xl p-8 shadow-xl">
                <!-- Данные заказа -->
                <div class="bg-gray-50 rounded-xl p-6 mb-6">
                    <h2 class="font-bold mb-4 text-lg">Данные заказа:</h2>
                    <div class="space-y-3">
                        <div class="flex justify-between items-center">
                            <span class="text-gray-600">Имя:</span>
                            <span class="font-semibold text-gray-900" id="displayName">Загрузка...</span>
                        </div>
                        <div class="flex justify-between items-center">
                            <span class="text-gray-600">Email:</span>
                            <span class="font-semibold text-gray-900" id="displayEmail">Загрузка...</span>
                        </div>
                        <div class="flex justify-between items-center pt-3 border-t">
                            <span class="text-gray-600">Сумма:</span>
                            <span class="font-bold text-[#FF8C00] text-2xl">499 руб.</span>
                        </div>
                    </div>
                </div>

                <!-- Способы оплаты -->
                <h2 class="font-bold mb-4 text-lg">Выберите способ оплаты:</h2>
                <div class="space-y-3 mb-6">
                    <div class="payment-method border-2 border-gray-200 rounded-lg p-4 flex items-center gap-4 cursor-pointer hover:border-[#FF8C00] transition-all" onclick="selectPayment('card', this)">
                        <span class="text-2xl">💳</span>
                        <div class="flex-1">
                            <div class="font-semibold">Банковская карта</div>
                            <div class="text-sm text-gray-500">Visa, Mastercard, МИР</div>
                        </div>
                    </div>
                    <div class="payment-method border-2 border-gray-200 rounded-lg p-4 flex items-center gap-4 cursor-pointer hover:border-[#FF8C00] transition-all" onclick="selectPayment('sbp', this)">
                        <span class="text-2xl">⚡</span>
                        <div class="flex-1">
                            <div class="font-semibold">СБП</div>
                            <div class="text-sm text-gray-500">Система быстрых платежей</div>
                        </div>
                    </div>
                    <div class="payment-method border-2 border-gray-200 rounded-lg p-4 flex items-center gap-4 cursor-pointer hover:border-[#FF8C00] transition-all" onclick="selectPayment('yoomoney', this)">
                        <span class="text-2xl">💰</span>
                        <div class="flex-1">
                            <div class="font-semibold">ЮMoney</div>
                            <div class="text-sm text-gray-500">ЮMoney, SberPay, T-Pay</div>
                        </div>
                    </div>
                </div>

                <!-- Кнопка -->
                <button id="payBtn" onclick="processPayment()" class="w-full bg-[#FF8C00] hover:bg-[#FF7F00] text-white font-bold py-4 rounded-lg text-lg transition-all disabled:opacity-50 disabled:cursor-not-allowed" disabled>
                    Выберите способ оплаты
                </button>

                <div class="mt-6 flex items-center justify-center gap-4 text-sm text-gray-600">
                    <span>🔒 Оплата защищена</span>
                    <span>•</span>
                    <span>⚡ Методичка придет на email</span>
                </div>
            </div>
        </div>
    </section>

    <script>
        // ===== ВАШИ ДАННЫЕ =====
        // ВАРИАНТ 1: Ссылка на платежную страницу ЮKassa (создайте в личном кабинете)
        const YOOKASSA_PAYMENT_LINK = 'https://yoomoney.ru/quickpay/confirm.xml?receiver=ВАШ_КОШЕЛЕК&sum=499&paymentType=SB&label=methodichka&successURL=' + encodeURIComponent(window.location.origin + '/purchaseok.html');
        
        // ВАРИАНТ 2: Если используете ЮKassa Payment Link (создается в кабинете ЮKassa)
        // const YOOKASSA_PAYMENT_LINK = 'https://yookassa.ru/my/ВАША_ССЫЛКА';
        
        // ===== ПОЛУЧЕНИЕ ДАННЫХ =====
        const urlParams = new URLSearchParams(window.location.search);
        const customerName = urlParams.get('name') || localStorage.getItem('customerName') || 'Клиент';
        const customerEmail = urlParams.get('email') || localStorage.getItem('customerEmail') || '';
        
        document.getElementById('displayName').textContent = customerName;
        document.getElementById('displayEmail').textContent = customerEmail;
        
        let selectedPayment = null;
        
        function selectPayment(method, element) {
            selectedPayment = method;
            
            // Убираем выделение со всех
            document.querySelectorAll('.payment-method').forEach(el => {
                el.classList.remove('border-[#FF8C00]', 'bg-orange-50');
                el.classList.add('border-gray-200');
            });
            
            // Выделяем выбранный
            element.classList.remove('border-gray-200');
            element.classList.add('border-[#FF8C00]', 'bg-orange-50');
            
            // Активируем кнопку
            const btn = document.getElementById('payBtn');
            btn.disabled = false;
            
            const labels = {
                'card': 'Оплатить картой',
                'sbp': 'Оплатить через СБП',
                'yoomoney': 'Оплатить через ЮMoney'
            };
            btn.textContent = labels[method] + ' →';
        }
        
        function processPayment() {
            if (!selectedPayment) {
                alert('Пожалуйста, выберите способ оплаты');
                return;
            }
            
            const btn = document.getElementById('payBtn');
            btn.disabled = true;
            btn.textContent = ' Переход к оплате...';
            
            // Сохраняем данные для использования на странице успеха
            localStorage.setItem('currentOrder', JSON.stringify({
                name: customerName,
                email: customerEmail,
                amount: 499,
                payment_method: selectedPayment,
                date: new Date().toISOString()
            }));
            
            // Формируем итоговую ссылку с параметрами
            let paymentUrl = YOOKASSA_PAYMENT_LINK;
            
            // Добавляем параметры возврата
            const returnUrl = window.location.origin + '/purchaseok.html?email=' + encodeURIComponent(customerEmail) + '&name=' + encodeURIComponent(customerName);
            
            // Если в ссылке нет successURL, добавляем его
            if (!paymentUrl.includes('successURL')) {
                paymentUrl += (paymentUrl.includes('?') ? '&' : '?') + 'successURL=' + encodeURIComponent(returnUrl);
            }
            
            // Перенаправляем на оплату
            setTimeout(() => {
                window.location.href = paymentUrl;
            }, 500);
        }
    </script>
</body>
</html>
