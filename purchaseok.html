<script>
    // Получаем данные из URL
    const urlParams = new URLSearchParams(window.location.search);
    const email = urlParams.get('email') || '';
    const orderId = urlParams.get('order_id') || '';
    const name = urlParams.get('name') || '';

    // Заполняем данные на странице
    if (email) document.getElementById('orderEmail').textContent = email;
    if (orderId) document.getElementById('orderId').textContent = '#' + orderId;
    
    // Устанавливаем дату
    document.getElementById('orderDate').textContent = new Date().toLocaleDateString('ru-RU', {
        year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit'
    });

    // Функция скачивания методички
    function downloadMethodichka() {
        // ССЫЛКА НА ВАШ PDF ФАЙЛ
        const pdfUrl = 'https://drive.google.com/uc?export=download&id=ВАШ_FILE_ID';
        window.open(pdfUrl, '_blank');
    }
</script>
