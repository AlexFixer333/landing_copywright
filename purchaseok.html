<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Оплата прошла успешно — CopywritingExpert</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

    <header class="bg-[#1A1A2E] text-white py-4">
        <div class="max-w-4xl mx-auto px-6 text-center">
            <span class="font-[Playfair_Display] text-3xl font-bold">Copywriting</span>
            <span class="font-[Playfair_Display] text-3xl font-bold italic text-[#FF8C00]">Expert</span>
        </div>
    </header>

    <section class="py-20">
        <div class="max-w-2xl mx-auto px-6 text-center">
            <!-- Green Checkmark -->
            <div class="w-24 h-24 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/>
                </svg>
            </div>
            
            <h1 class="text-4xl font-bold text-gray-900 mb-4">Оплата прошла успешно!</h1>
            <p class="text-xl text-gray-600 mb-8">Спасибо за покупку!</p>
            
            <!-- Download Card -->
            <div class="bg-white rounded-2xl p-8 shadow-xl mb-8">
                <h2 class="text-2xl font-bold mb-6">Ваша методичка готова</h2>
                
                <!-- Order Info -->
                <div class="bg-gray-50 rounded-lg p-4 mb-6 text-left">
                    <div class="space-y-2">
                        <div><strong>Имя:</strong> <span id="orderName">Загрузка...</span></div>
                        <div><strong>Email:</strong> <span id="orderEmail">Загрузка...</span></div>
                        <div><strong>Номер заказа:</strong> <span id="orderId" class="font-mono">Загрузка...</span></div>
                        <div><strong>Сумма:</strong> <span class="text-[#FF8C00] font-bold text-xl">499 руб.</span></div>
                    </div>
                </div>
                
                <!-- Download Button -->
                <button onclick="downloadMethodichka()" id="downloadBtn" class="w-full bg-[#FF8C00] hover:bg-[#FF7F00] text-white font-bold py-4 rounded-lg text-lg transition-all">
                     Скачать методичку (PDF)
                </button>
                
                <p class="text-sm text-gray-500 mt-4">Нажмите кнопку выше, чтобы скачать файл</p>
            </div>
            
            <!-- Support -->
            <div class="text-center">
                <p class="text-gray-600 mb-2">Нужна помощь?</p>
                <a href="https://t.me/shundyquru" target="_blank" class="text-[#FF8C00] hover:underline font-semibold">
                    Написать в Telegram →
                </a>
            </div>
        </div>
    </section>

    <script>
        // ===== НАСТРОЙКИ =====
        
        // 1. ССЫЛКА НА ВАШ PDF ФАЙЛ (Google Drive)
        // Замените ВАШ_FILE_ID на реальный ID файла
        const METHODICHKA_URL = 'https://drive.google.com/file/d/1Iq5ntSS9nIjtL1uCa54G6pqjg20r-Lvk/view?usp=sharing';
        
        // 2. GOOGLE APPS SCRIPT URL (для сохранения заказов в таблицу)
        // Замените на ваш URL из Apps Script
        const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwKycGaxaHMkvbH1edaN4_BzBl9ADVk4eJhpdF5pwCtuk71gztfe91g5dWJNHQNUMqr/exec';
        
        // ===== ПОЛУЧЕНИЕ ДАННЫХ ИЗ URL =====
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        const name = urlParams.get('name');
        const orderId = urlParams.get('order_id');
        
        // ===== ЗАПОЛНЕНИЕ ДАННЫХ НА СТРАНИЦЕ =====
        if (email) document.getElementById('orderEmail').textContent = email;
        if (name) document.getElementById('orderName').textContent = name;
        if (orderId) document.getElementById('orderId').textContent = orderId;
        
        // ===== СОХРАНЕНИЕ ЗАКАЗА В GOOGLE ТАБЛИЦУ =====
        async function saveOrder() {
            if (!email || !name || !orderId) return;
            
            try {
                await fetch(APPS_SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        order_id: orderId,
                        name: name,
                        email: email,
                        amount: 499,
                        payment_method: 'yookassa',
                        status: 'completed',
                        note: 'Оплата через ЮKassa'
                    })
                });
                
                console.log('✅ Заказ сохранен в Google Таблицу');
                
            } catch (error) {
                console.error(' Ошибка сохранения заказа:', error);
            }
        }
        
        // Запускаем сохранение при загрузке страницы
        window.addEventListener('load', saveOrder);
        
        // ===== ФУНКЦИЯ СКАЧИВАНИЯ МЕТОДИЧКИ =====
        function downloadMethodichka() {
            const btn = document.getElementById('downloadBtn');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '⏳ Загрузка...';
            btn.disabled = true;
            
            setTimeout(() => {
                window.open(METHODICHKA_URL, '_blank');
                
                btn.innerHTML = '✓ Скачано!';
                btn.classList.remove('bg-[#FF8C00]', 'hover:bg-[#FF7F00]');
                btn.classList.add('bg-green-500');
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                    btn.classList.remove('bg-green-500');
                    btn.classList.add('bg-[#FF8C00]', 'hover:bg-[#FF7F00]');
                }, 3000);
            }, 500);
        }
    </script>
</body>
</html>
